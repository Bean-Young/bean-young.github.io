name: Update site stats

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch Scholar citations and GitHub stars
        run: python scripts/fetch_site_stats.py

      - name: Commit stats.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh stats.json (Scholar + GitHub)"
          file_pattern: stats.json

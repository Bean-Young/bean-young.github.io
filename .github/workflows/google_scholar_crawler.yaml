# Copied from https://github.com/RayeRen/acad-homepage.github.io/blob/main/.github/workflows/google_scholar_crawler.yaml
# + permissions (required for GITHUB_TOKEN to push a branch on current GitHub).
name: Get Citation Data

on:
  page_build:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Reqs
        run: pip install -r google_scholar_crawler/requirements.txt

      - name: Run
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd ./google_scholar_crawler
          python main.py
          python github_stars.py
          python update_paper_graph_citations.py
          cd ./results
          git init
          git config --local user.name "${GITHUB_ACTOR}"
          export remote_repo="https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git add *.json
          git commit -m "Updated Citation Data"
          git push "${remote_repo}" HEAD:google-scholar-stats --force

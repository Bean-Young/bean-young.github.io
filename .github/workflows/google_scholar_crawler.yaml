# Mirrors https://github.com/RayeRen/acad-homepage.github.io/blob/main/.github/workflows/google_scholar_crawler.yaml
# Pushes JSON to branch google-scholar-stats (not main). Set secret GOOGLE_SCHOLAR_ID = SBZ_9bAAAAAJ (or your id).
name: Get Citation Data

permissions:
  contents: write

on:
  page_build:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
  push:
    branches: [main, master]
    paths:
      - "google_scholar_crawler/**"
      - ".github/workflows/google_scholar_crawler.yaml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Reqs
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-setuptools

      - name: Run
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        run: |
          cd ./google_scholar_crawler
          pip3 install -r requirements.txt
          python3 main.py
          python3 github_stars.py
          cd ./results
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.json
          git commit -m "Updated Citation Data"
          remote_repo="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push "${remote_repo}" HEAD:google-scholar-stats --force

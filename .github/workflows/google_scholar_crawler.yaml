# Mirrors https://github.com/RayeRen/acad-homepage.github.io/blob/main/.github/workflows/google_scholar_crawler.yaml
# Pushes JSON to branch google-scholar-stats (not main).
# Secrets: GOOGLE_SCHOLAR_ID. If Scholar returns 403 in CI, set Variable OPENALEX_ORCID (ORCID id, e.g. 0009-0002-0059-0365).
name: Get Citation Data

permissions:
  contents: write

on:
  page_build:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
  push:
    branches: [main, master]
    paths:
      - "google_scholar_crawler/**"
      - ".github/workflows/google_scholar_crawler.yaml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r google_scholar_crawler/requirements.txt

      - name: Run
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
          OPENALEX_ORCID: ${{ vars.OPENALEX_ORCID }}
        run: |
          cd ./google_scholar_crawler
          python main.py
          python github_stars.py
          cd ./results
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.json
          git commit -m "Updated Citation Data"
          remote_repo="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push "${remote_repo}" HEAD:google-scholar-stats --force
